<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin panel quản lý sản phẩm PlantLab">
    <title>PlantLab Admin - Quản Trị Sản Phẩm</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1 class="admin-title">
                <i class="fa-solid fa-leaf"></i> Quản Trị Sản Phẩm PlantLab
            </h1>
            <p class="admin-subtitle">Thêm, sửa, xóa sản phẩm của website</p>
        </div>

        <!-- Add/Edit Product Form -->
        <div class="admin-form">
            <h2 id="formTitle">Thêm Sản Phẩm Mới</h2>
            
            <input type="hidden" id="editProductId">

            <div class="form-group">
                <label for="prodTitle">Tên sản phẩm</label>
                <input type="text" id="prodTitle" placeholder="Nhập tên sản phẩm" required>
            </div>

            <div class="form-group">
                <label for="prodPrice">Giá sản phẩm (đ)</label>
                <input type="number" id="prodPrice" placeholder="Nhập giá" min="0" required>
            </div>

            <div class="form-group">
                <label for="prodImage">Đường dẫn ảnh</label>
                <input type="text" id="prodImage" placeholder="assets/images/product1.jpg" required>
            </div>

            <div class="form-group">
                <label for="prodDesc">Mô tả sản phẩm</label>
                <textarea id="prodDesc" placeholder="Nhập mô tả sản phẩm" rows="4" required></textarea>
            </div>

            <div class="form-actions">
                <button type="button" class="admin-btn btn-save" id="btnSaveProduct" onclick="saveProduct()">
                    <i class="fa-solid fa-save"></i> Lưu sản phẩm
                </button>
                <button type="button" class="admin-btn btn-cancel" id="btnCancelEdit" onclick="resetAdminForm()">
                    <i class="fa-solid fa-xmark"></i> Hủy chỉnh sửa
                </button>
            </div>
        </div>

        <!-- Search & Filter Section -->
        <div class="admin-search-section">
            <input type="text" id="searchProduct" placeholder="Tìm kiếm sản phẩm..." class="search-input">
            <button type="button" class="admin-btn btn-search" id="btnSearch" onclick="searchAdminProduct()">
                <i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm
            </button>
        </div>

        <!-- Products Table -->
        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Giá</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="adminProductTableBody">
                    <!-- Generated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- No products message -->
        <div id="noProductsMessage" class="no-products-message" style="display: none;">
            <i class="fa-solid fa-inbox"></i>
            <p>Không có sản phẩm nào. Hãy thêm sản phẩm mới!</p>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="../js/script.js"></script>
</body>
</html>
